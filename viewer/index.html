        }
        
        // MSI座標系のサイズを取得（最初のMSI画像から推定）
        function getMsiRefSize() {
            const msiKeys = Object.keys(imageSources).filter(k => /^MSI/i.test(k));
            if (msiKeys.length > 0) {
                const ref = imageSources[msiKeys[0]];
                if (ref && ref.naturalWidth > 0) return { w: ref.naturalWidth, h: ref.naturalHeight };
            }
            // フォールバック: ROI座標の最大値から推定
            return { w: roiCanvas.width, h: roiCanvas.height };
        }

        function drawAllRois(highlightKey = null) {
            if (!roiCtx || roiCanvas.width === 0) return;

            roiCtx.clearRect(0, 0, roiCanvas.width, roiCanvas.height);

            // ROIトグルがOFFなら描画しない
            const roiToggle = document.getElementById('roi-toggle');
            if (roiToggle && !roiToggle.checked) return;

            const roiItems = (atlasData.roi && atlasData.roi.roi_items) ? atlasData.roi.roi_items : {};
            const palette = (atlasData.roi && atlasData.roi.palette) ? atlasData.roi.palette : {};

            // MSI座標(縦長)をCCW90°回転して横長キャンバスにマッピング
            // MSI(mx,my) → portrait(mx*sX, my*sY) → CCW90°→ landscape(my*sY2, canvasH - mx*sX2)
            const msiRef = getMsiRefSize();
            const sxFactor = roiCanvas.height / msiRef.w;  // MSI-x → canvas-y方向
            const syFactor = roiCanvas.width  / msiRef.h;  // MSI-y → canvas-x方向

            // キャンバス内部解像度 → CSS 表示サイズ比から、CSS 1px 相当の線幅を算出
            const cssW = roiCanvas.offsetWidth || roiCanvas.width;
            const pxPerCss = roiCanvas.width / Math.max(1, cssW);

            Object.keys(roiItems).forEach(roiKey => {
                const isHighlight = roiKey === highlightKey;
                const rgba = palette[roiKey];
                if (!roiItems[roiKey] || !roiItems[roiKey][0] || !roiItems[roiKey][0].poly_msi || !rgba) return;

                const poly = roiItems[roiKey][0].poly_msi;

                roiCtx.beginPath();
                if (poly.length > 0) {
                    const cx = poly[0][1] * syFactor;
                    const cy = roiCanvas.height - poly[0][0] * sxFactor;
                    roiCtx.moveTo(cx, cy);
                }
                for (let i = 1; i < poly.length; i++) {
                    const cx = poly[i][1] * syFactor;
                    const cy = roiCanvas.height - poly[i][0] * sxFactor;
                    roiCtx.lineTo(cx, cy);
                }
                roiCtx.closePath();

                roiCtx.strokeStyle = `rgba(${rgba[0]}, ${rgba[1]}, ${rgba[2]}, 0.95)`;
                // CSS 表示で 1〜2px になるよう内部座標の lineWidth を計算
                roiCtx.lineWidth = (isHighlight ? 2.0 : 1.0) * pxPerCss;
                roiCtx.stroke();
            });
        }

        function setupGraphSelector() {
            const select1 = document.getElementById('graph-select-1');
            const select2 = document.getElementById('graph-select-2');
            const select3 = document.getElementById('graph-select-3');
            const graphKeys = Object.keys(graphData).filter(k => k !== 'comparison' && Object.keys(graphData[k]).length > 0);

            [select1, select2, select3].forEach(s => s.innerHTML = '');

            graphKeys.forEach(key => select1.add(new Option(formatDisplayName(key), key)));
            select2.add(new Option('-', 'none'));
            graphKeys.forEach(key => select2.add(new Option(formatDisplayName(key), key)));
            select3.add(new Option('-', 'none'));
            graphKeys.forEach(key => select3.add(new Option(formatDisplayName(key), key)));

            const msiKeys = graphKeys.filter(k => k.startsWith('MSI_'));
            if (msiKeys.length >= 1) select1.value = msiKeys[0];
            if (msiKeys.length >= 2) select2.value = msiKeys[1];
            if (msiKeys.length >= 3) select3.value = msiKeys[2];

            const updateGraph = () => {
                const activeRoi = document.querySelector('.roi-item.active');
                if (activeRoi) displayGraphForRoi(activeRoi.dataset.roiKey);
            };

            select1.addEventListener('change', updateGraph);
            select2.addEventListener('change', updateGraph);
            select3.addEventListener('change', updateGraph);
        }

        /**
         * ROI内のMSIピクセル強度を抽出する
         * poly_msi座標はMSI画像のピクセル空間（portrait）上の座標
         */
        function extractRoiPixels(imageKey, roiKey) {
            const sourceImg = imageSources[imageKey];
            if (!sourceImg || !sourceImg.complete || sourceImg.naturalWidth === 0) return [];
            const polys = atlasData.roi?.roi_items?.[roiKey];
            if (!polys || polys.length === 0) return [];

            const iw = sourceImg.naturalWidth;
            const ih = sourceImg.naturalHeight;
            const tc = document.createElement('canvas');
            tc.width = iw; tc.height = ih;
            const tctx = tc.getContext('2d', { willReadFrequently: true });
            tctx.drawImage(sourceImg, 0, 0);
            const imgData = tctx.getImageData(0, 0, iw, ih);
            const data = imgData.data;

            // ROIポリゴン内判定（poly_msi座標 = MSI画像ピクセル座標）
            const values = [];
            for (const poly of polys) {
                if (!Array.isArray(poly.poly_msi)) continue;
                const vertices = poly.poly_msi;
                // バウンディングボックス
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                for (const [mx, my] of vertices) {
                    if (mx < minX) minX = mx; if (mx > maxX) maxX = mx;
                    if (my < minY) minY = my; if (my > maxY) maxY = my;
                }
                const x0 = Math.max(0, Math.floor(minX));
                const x1 = Math.min(iw - 1, Math.ceil(maxX));
                const y0 = Math.max(0, Math.floor(minY));
                const y1 = Math.min(ih - 1, Math.ceil(maxY));

                for (let py = y0; py <= y1; py++) {
                    for (let px = x0; px <= x1; px++) {
                        if (pointInPolygon(px, py, vertices)) {
                            const idx = (py * iw + px) * 4;
                            if (data[idx + 3] === 0) continue; // 透明ピクセル除外
                            const lum = 0.299 * data[idx] + 0.587 * data[idx + 1] + 0.114 * data[idx + 2];
                            values.push(lum);
                        }
                    }
                }
            }
            return values;
        }

        // レイキャスト法による点のポリゴン内判定
        function pointInPolygon(x, y, vertices) {
            let inside = false;
            for (let i = 0, j = vertices.length - 1; i < vertices.length; j = i++) {
                const xi = vertices[i][0], yi = vertices[i][1];
                const xj = vertices[j][0], yj = vertices[j][1];
                if (((yi > y) !== (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi)) {
                    inside = !inside;
                }
            }
            return inside;
        }

        /** 平均と標準偏差を計算 */
        function calcStats(arr) {
            if (arr.length === 0) return { mean: 0, sd: 0, n: 0 };
            const n = arr.length;
            const mean = arr.reduce((s, v) => s + v, 0) / n;
            const variance = arr.reduce((s, v) => s + (v - mean) ** 2, 0) / n;
            return { mean, sd: Math.sqrt(variance), n };
        }

        function displayGraphForRoi(highlightRoiKey) {
            const graphContainer = document.getElementById('graph-container');
            const select1Val = document.getElementById('graph-select-1').value;
            const select2Val = document.getElementById('graph-select-2').value;
            const select3Val = document.getElementById('graph-select-3').value;

            // Canvasを用意
            let graphCanvas = document.getElementById('graph-canvas');
            const graphImage = document.getElementById('graph-image');
            if (!graphCanvas) {
                graphCanvas = document.createElement('canvas');
                graphCanvas.id = 'graph-canvas';
                graphCanvas.className = 'w-full h-auto';
                graphCanvas.style.maxHeight = '450px';
                graphContainer.innerHTML = '';
                graphContainer.appendChild(graphCanvas);
            }
            if (graphImage) graphImage.style.display = 'none';

            // 全ROIのキーとパレットを取得
            const roiItems = atlasData.roi?.roi_items || {};
            const roiNames = atlasData.roi?.roi_names || {};
            const palette = atlasData.roi?.palette || {};
            const roiKeys = Object.keys(roiItems);

            if (roiKeys.length === 0) return;

            // 選択されたチャネルを収集（重複除外）
            const channels = [select1Val];
            if (select2Val !== 'none' && !channels.includes(select2Val)) channels.push(select2Val);
            if (select3Val !== 'none' && !channels.includes(select3Val)) channels.push(select3Val);

            // 各チャネル×全ROIの統計を計算
            const allStats = {};
            for (const ch of channels) {
                allStats[ch] = {};
                for (const rk of roiKeys) {
                    allStats[ch][rk] = calcStats(extractRoiPixels(ch, rk));
                }
            }

            if (channels.length === 1) {
                drawBarChart(graphCanvas, roiKeys, roiNames, palette, allStats[channels[0]], channels[0], highlightRoiKey);
            } else {
                drawMultiBarChart(graphCanvas, roiKeys, roiNames, palette, allStats, channels, highlightRoiKey);
            }
        }

        function drawBarChart(canvas, roiKeys, roiNames, palette, statsPerRoi, imageKey, highlightRoiKey) {
            const nBars = roiKeys.length;
            const container = document.getElementById('graph-container');
            const cw = container ? container.clientWidth : 500;
            const ch = container ? container.clientHeight : 400;
            const W = Math.max(cw, nBars * 40 + 80), H = Math.max(ch, 200);
            canvas.width = W; canvas.height = H;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fafafa'; ctx.fillRect(0, 0, W, H);

            const margin = { top: 45, right: 30, bottom: 70, left: 75 };
            const pw = W - margin.left - margin.right;
            const ph = H - margin.top - margin.bottom;

            // Y軸の最大値（meanの最大）
            let yMax = 0;
            for (const rk of roiKeys) {
                const s = statsPerRoi[rk];
                yMax = Math.max(yMax, s.mean);
            }
            if (yMax === 0) yMax = 1;
            yMax *= 1.15; // 余白

            const barW = pw / nBars;
            const barPad = barW * 0.2;

            // グリッド線
            ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 0.5;
            const nTicks = 5;
            for (let i = 1; i <= nTicks; i++) {
                const y = H - margin.bottom - (i / nTicks) * ph;
                ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(W - margin.right, y); ctx.stroke();
            }

            // 軸
            ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(margin.left, margin.top);
            ctx.lineTo(margin.left, H - margin.bottom);
            ctx.lineTo(W - margin.right, H - margin.bottom);
            ctx.stroke();

            // MSI色を取得
            const msiColor = getMsiColor(imageKey);

            // バー描画
            for (let i = 0; i < nBars; i++) {
                const rk = roiKeys[i];
                const s = statsPerRoi[rk];
                const rgba = palette[rk] || [150, 150, 150, 255];
                const isHighlight = (rk === highlightRoiKey);

                // バーの色: ROIパレット色をベースに、MSI色があればそちらを使い、ROI色は枠線に
                let fillColor, strokeColor;
                if (msiColor) {
                    const alpha = isHighlight ? 0.9 : 0.65;
                    fillColor = `rgba(${msiColor[0]},${msiColor[1]},${msiColor[2]},${alpha})`;
                    strokeColor = `rgba(${rgba[0]},${rgba[1]},${rgba[2]},1)`;
                } else {
                    const alpha = isHighlight ? 0.9 : 0.65;
                    fillColor = `rgba(${rgba[0]},${rgba[1]},${rgba[2]},${alpha})`;
                    strokeColor = `rgb(${Math.max(0,rgba[0]-40)},${Math.max(0,rgba[1]-40)},${Math.max(0,rgba[2]-40)})`;
                }

                const barH = (s.mean / yMax) * ph;
                const x = margin.left + i * barW + barPad;
                const bw = barW - barPad * 2;
                const y = H - margin.bottom - barH;

                ctx.fillStyle = fillColor;
                ctx.fillRect(x, y, bw, barH);
                ctx.strokeStyle = strokeColor;
                ctx.lineWidth = isHighlight ? 2.5 : 1;
                ctx.strokeRect(x, y, bw, barH);

                // X軸ラベル（ROI名）
                const cx = x + bw / 2;
                ctx.fillStyle = isHighlight ? '#000' : '#444';
                ctx.font = isHighlight ? 'bold 14px sans-serif' : '13px sans-serif';
                ctx.textAlign = 'center';
                const name = roiNames[rk] || rk;
                ctx.fillText(name, cx, H - margin.bottom + 18);
            }

            // Y軸ラベル
            ctx.fillStyle = '#333'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
            for (let i = 0; i <= nTicks; i++) {
                const v = (i / nTicks) * yMax;
                const y = H - margin.bottom - (i / nTicks) * ph;
                ctx.fillText(formatAxisValue(v), margin.left - 8, y + 4);
            }
            ctx.save(); ctx.translate(18, H / 2); ctx.rotate(-Math.PI / 2);
            ctx.textAlign = 'center'; ctx.font = '12px sans-serif';
            ctx.fillText('Mean Intensity', 0, 0); ctx.restore();

            // タイトル
            ctx.fillStyle = '#222'; ctx.font = 'bold 14px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(`${formatDisplayName(imageKey)} — ROI Mean Intensity`, W / 2, 26);
        }

        function drawMultiBarChart(canvas, roiKeys, roiNames, palette, allStats, channels, highlightRoiKey) {
            const nRoi = roiKeys.length;
            const nCh = channels.length;
            const container = document.getElementById('graph-container');
            const cw = container ? container.clientWidth : 550;
            const ch = container ? container.clientHeight : 420;
            const W = Math.max(cw, nRoi * (nCh * 16 + 20) + 100), H = Math.max(ch, 200);
            canvas.width = W; canvas.height = H;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#fafafa'; ctx.fillRect(0, 0, W, H);

            const margin = { top: 50, right: 30, bottom: 80, left: 75 };
            const pw = W - margin.left - margin.right;
            const ph = H - margin.top - margin.bottom;

            // Y軸最大値
            let yMax = 0;
            for (const ch of channels) {
                for (const rk of roiKeys) {
                    yMax = Math.max(yMax, allStats[ch][rk].mean);
                }
            }
            if (yMax === 0) yMax = 1;
            yMax *= 1.15;

            const groupW = pw / nRoi;
            const padRatio = 0.1;
            const innerW = groupW * (1 - 2 * padRatio);
            const barW = innerW / nCh - 2;
            const gap = 2;

            // グリッド線
            ctx.strokeStyle = '#e0e0e0'; ctx.lineWidth = 0.5;
            const nTicks = 5;
            for (let i = 1; i <= nTicks; i++) {
                const y = H - margin.bottom - (i / nTicks) * ph;
                ctx.beginPath(); ctx.moveTo(margin.left, y); ctx.lineTo(W - margin.right, y); ctx.stroke();
            }

            // 軸
            ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(margin.left, margin.top);
            ctx.lineTo(margin.left, H - margin.bottom);
            ctx.lineTo(W - margin.right, H - margin.bottom);
            ctx.stroke();

            // チャネルごとの色
            const chColors = channels.map(ch => getMsiColor(ch) || [100, 100, 200]);

            for (let ri = 0; ri < nRoi; ri++) {
                const rk = roiKeys[ri];
                const isHighlight = (rk === highlightRoiKey);
                const rgba = palette[rk] || [150, 150, 150, 255];
                const gx = margin.left + ri * groupW + groupW * padRatio;

                for (let ci = 0; ci < nCh; ci++) {
                    const ch = channels[ci];
                    const s = allStats[ch][rk];
                    const color = chColors[ci];
                    const alpha = isHighlight ? 0.9 : 0.6;
                    const bx = gx + ci * (barW + gap);
                    const barH = (s.mean / yMax) * ph;
                    const by = H - margin.bottom - barH;

                    ctx.fillStyle = `rgba(${color[0]},${color[1]},${color[2]},${alpha})`;
                    ctx.fillRect(bx, by, barW, barH);
                    // 枠線はROIの色
                    ctx.strokeStyle = `rgb(${rgba[0]},${rgba[1]},${rgba[2]})`;
                    ctx.lineWidth = isHighlight ? 2.5 : 1.5;
                    ctx.strokeRect(bx, by, barW, barH);
                }

                // X軸ラベル
                const cx = margin.left + ri * groupW + groupW / 2;
                const name = roiNames[rk] || rk;
                ctx.fillStyle = isHighlight ? '#000' : '#444';
                ctx.font = isHighlight ? 'bold 14px sans-serif' : '13px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText(name, cx, H - margin.bottom + 18);
            }

            // Y軸ラベル
            ctx.fillStyle = '#333'; ctx.font = '11px sans-serif'; ctx.textAlign = 'right';
            for (let i = 0; i <= nTicks; i++) {
                const v = (i / nTicks) * yMax;
                const y = H - margin.bottom - (i / nTicks) * ph;
                ctx.fillText(formatAxisValue(v), margin.left - 8, y + 4);
            }
            ctx.save(); ctx.translate(18, H / 2); ctx.rotate(-Math.PI / 2);
            ctx.textAlign = 'center'; ctx.font = '12px sans-serif';
            ctx.fillText('Mean Intensity', 0, 0); ctx.restore();

            // 凡例（中央揃え）
            const legY = 10;
            const legItemW = 110;
            const legTotalW = nCh * legItemW;
            const legStartX = (W - legTotalW) / 2;
            for (let ci = 0; ci < nCh; ci++) {
                const color = chColors[ci];
                const lx = legStartX + ci * legItemW;
                ctx.fillStyle = `rgb(${color[0]},${color[1]},${color[2]})`;
                ctx.fillRect(lx, legY, 14, 14);
                ctx.fillStyle = '#333'; ctx.font = '11px sans-serif'; ctx.textAlign = 'left';
                ctx.fillText(formatDisplayName(channels[ci]), lx + 18, legY + 12);
            }

            // タイトル
            const title = channels.map(ch => formatDisplayName(ch)).join(' vs ');
            ctx.fillStyle = '#222'; ctx.font = 'bold 13px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText(`${title} — ROI Mean Intensity`, W / 2, 40);
        }

        /** Y軸の値をフォーマット（大きい値は科学表記） */
        function formatAxisValue(v) {
            if (v === 0) return '0';
            if (v >= 1e6) return v.toExponential(1);
            if (v >= 1000) return Math.round(v).toLocaleString();
            if (v >= 1) return v.toFixed(1);
            return v.toFixed(2);
        }
        
        function setupCollapsibleSections() {
            const setupToggle = (toggleId, contentId, iconId) => {
                const toggleEl = document.getElementById(toggleId);
                const contentEl = document.getElementById(contentId);
                const iconEl = document.getElementById(iconId);
                
                if (toggleEl && contentEl && iconEl) {
                    contentEl.classList.remove('hidden');
                    iconEl.classList.add('rotate-180');
                    toggleEl.addEventListener('click', () => {
                        contentEl.classList.toggle('hidden');
                        iconEl.classList.toggle('rotate-180');
                    });
                }
            };

            setupToggle('toggle-image-selection', 'thumbnail-container', 'icon-image-selection');
            setupToggle('toggle-analysis-graph', 'analysis-graph-content', 'icon-analysis-graph');
        }
    </script>

    <script>
    async function loadAtlasJsonExternal() {
      const params = new URLSearchParams(location.search);
      const atlasId = params.get('atlas') || null;
      if (!atlasId) return null;
      const url = `../datasets/${atlasId}/atlas.json`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`atlas.json fetch failed: ${res.status} ${url}`);
      return await res.json();
    }

    async function buildPngFromTxt(def) {
      /* 省略（元のまま） */
      /* …中略…  */
      // 元の関数本文はそのままです
      const res = await fetch(def.src);
      if (!res.ok) throw new Error(`txt fetch failed: ${res.status} ${def.src}`);
      const raw = await res.text();
      const linesAll = raw.split(/\r?\n/);
      const lines = linesAll.filter(s => s.trim().length > 0);
      if (lines.length < 1) throw new Error(`no content in ${def.src}`);
      const isAnalyte = /^\s*Analyte\s*\(converted from imzML\)\s*$/i.test(lines[0]);
      let rows = [];
      let valueColIndex = null;
      if (isAnalyte) {
        if (lines.length < 5) throw new Error(`Analyte format too short: ${def.src}`);
        const precs = lines[2].trim().split(/\s+/).map(Number).filter(Number.isFinite);
        const prods = lines[3].trim().split(/\s+/).map(Number).filter(Number.isFinite);
        const nCh = Math.min(precs.length, prods.length);
        if (typeof def.v_index === "number" && def.v_index >= 0 && def.v_index < nCh) {
          valueColIndex = 3 + def.v_index;
        } else {
          const targetMz = (typeof def.v_mz === "number") ? def.v_mz : null;
          const targetPair = (def.v_mz_pair && Array.isArray(def.v_mz_pair) && def.v_mz_pair.length === 2)
            ? def.v_mz_pair.map(Number) : null;
          let pick = 0;
          if (Number.isFinite(targetMz)) {
            let best = Infinity;
            for (let i = 0; i < nCh; i++) {
              const d = Math.abs(precs[i] - targetMz);
              if (d < best) { best = d; pick = i; }
            }
          } else if (targetPair && targetPair.every(Number.isFinite)) {
            let best = Infinity;
            for (let i = 0; i < nCh; i++) {
              const d = Math.abs(precs[i] - targetPair[0]) + Math.abs(prods[i] - targetPair[1]);
              if (d < best) { best = d; pick = i; }
            }
          }
          valueColIndex = 3 + pick;
        }
        for (let i = 4; i < lines.length; i++) {
          const tok = lines[i].trim().split(/\s+/).map(t => Number(t));
          if (tok.length >= 4 && tok.slice(0, 4).every(Number.isFinite)) {
            const x  = tok[1];
            const y  = tok[2];
            if (valueColIndex >= tok.length) {
              console.warn(`[buildPngFromTxt] valueColIndex ${valueColIndex} は列数 ${tok.length} を超えています (行${i+1})`);
              continue;
            }
            const v  = tok[valueColIndex];
            if (Number.isFinite(x) && Number.isFinite(y) && Number.isFinite(v)) {
              rows.push({ x, y, v });
            }
          }
        }
        if (!rows.length) throw new Error(`no numeric rows (Analyte) in ${def.src}`);
      } else {
        const rawHeader = lines[0];
        const sep = (def.sep === "\\t" || def.sep === "\t") ? "\t"
                  : (def.sep === "," ? "," : null);
        const detectSep = sep || (rawHeader.includes("\t") ? "\t"
                             : (rawHeader.includes(",") ? ","
                             : "ws"));
        const splitBy = (s) => (detectSep === "ws" ? s.trim().split(/\s+/)
                                                   : s.split(detectSep));
        const header = splitBy(rawHeader).map(s => s.trim());
        const findIdx = (name) => {
          const i = header.indexOf(name);
          if (i < 0) throw new Error(`column '${name}' not found in ${def.src}`);
          return i;
        };
        const xi = findIdx(def.x);
        const yi = findIdx(def.y);
        const valueNames = def.v ? [def.v] : (def.v_cols || []);
        const vi = valueNames.map(findIdx);
        if (vi.length === 0) throw new Error(`no value column (v or v_cols) defined for ${def.src}`);
        const valueIndex = vi[0];
        for (let i = 1; i < lines.length; i++) {
          const cols = splitBy(lines[i]);
          if (cols.length < header.length) continue;
          const x = Number(cols[xi]), y = Number(cols[yi]), v = Number(cols[valueIndex]);
          if (Number.isFinite(x) && Number.isFinite(y) && Number.isFinite(v)) {
            rows.push({ x, y, v });
          }
        }
        if (!rows.length) throw new Error(`no numeric rows in ${def.src}`);
      }
      return rasterRowsToPngDataUrl(rows, def.range);
    }

    function rasterRowsToPngDataUrl(rows, range) {
      const xs = [...new Set(rows.map(r => r.x))].sort((a,b) => a - b);
      const ys = [...new Set(rows.map(r => r.y))].sort((a,b) => a - b);
      const W = xs.length, H = ys.length;
      const xIndex = new Map(xs.map((v,i) => [v, i]));
      const yIndex = new Map(ys.map((v,i) => [v, i]));
      const grid = Array(H).fill(0).map(() => Array(W).fill(NaN));
      const cnt  = Array(H).fill(0).map(() => Array(W).fill(0));
      for (const r of rows) {
        const ci = xIndex.get(r.x), ri = yIndex.get(r.y);
        if (ci == null || ri == null) continue;
        const old = grid[ri][ci];
        grid[ri][ci] = (Number.isFinite(old) ? old : 0) + r.v;
        cnt[ri][ci]  = (cnt[ri][ci] || 0) + 1;
      }
      let vmin = +Infinity, vmax = -Infinity;
      for (let i = 0; i < H; i++) {
        for (let j = 0; j < W; j++) {
          if (cnt[i][j] > 0) {
            grid[i][j] /= cnt[i][j];
            const val = grid[i][j];
            if (val < vmin) vmin = val;
            if (val > vmax) vmax = val;
          }
        }
      }
      if (range && range.length === 2) {
        vmin = range[0]; vmax = range[1];
        if (!(vmax > vmin)) vmax = vmin + 1e-9;
      } else {
        if (!(vmax > vmin)) { vmin = 0; vmax = 1; }
      }
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d', { willReadFrequently: true });
      const imgData = ctx.createImageData(W, H);
      let p = 0;
      for (let i = 0; i < H; i++) {
        for (let j = 0; j < W; j++) {
          const val = grid[i][j];
          if (!Number.isFinite(val)) {
            imgData.data[p++] = 0; imgData.data[p++] = 0; imgData.data[p++] = 0; imgData.data[p++] = 0;
          } else {
            const n = Math.max(0, Math.min(1, (val - vmin) / (vmax - vmin)));
            const g = Math.round(n * 255);
            imgData.data[p++] = g; imgData.data[p++] = g; imgData.data[p++] = g; imgData.data[p++] = 255;
          }
        }
      }
      ctx.putImageData(imgData, 0, 0);
      return canvas.toDataURL("image/png");
    }

    const xlsxWorkbookCache = new Map();
    async function fetchXlsxWorkbook(url) {
      if (xlsxWorkbookCache.has(url)) return xlsxWorkbookCache.get(url);
      const p = (async () => {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`xlsx fetch failed: ${res.status} ${url}`);
        const buf = await res.arrayBuffer();
        if (typeof XLSX === "undefined") throw new Error("SheetJS (XLSX) library not loaded");
        return XLSX.read(new Uint8Array(buf), { type: "array" });
      })();
      xlsxWorkbookCache.set(url, p);
      return p;
    }

    function a1ColToIndex(colRef) {
      if (typeof colRef === "number") return colRef;
      const s = String(colRef).toUpperCase();
      let n = 0;
      for (let i = 0; i < s.length; i++) {
        const c = s.charCodeAt(i);
        if (c < 65 || c > 90) return NaN;
        n = n * 26 + (c - 64);
      }
      return n - 1;
    }

    async function buildPngFromXlsx(def) {
      const wb = await fetchXlsxWorkbook(def.src);
      const sheetName = def.sheet || wb.SheetNames[0];
      const sheet = wb.Sheets[sheetName];
      if (!sheet) throw new Error(`sheet '${sheetName}' not found in ${def.src}`);
      const aoa = XLSX.utils.sheet_to_json(sheet, { header: 1, raw: true, defval: null });
      const startIdx = Math.max(0, (def.data_start_row || 1) - 1);
      const xi = a1ColToIndex(def.col_x);
      const yi = a1ColToIndex(def.col_y);
      const vi = a1ColToIndex(def.col_v);
      if (!Number.isFinite(xi) || !Number.isFinite(yi) || !Number.isFinite(vi)) {
        throw new Error(`invalid column refs in xlsx def: ${JSON.stringify(def)}`);
      }
      const rows = [];
      for (let i = startIdx; i < aoa.length; i++) {
        const r = aoa[i];
        if (!r) continue;
        const x = Number(r[xi]), y = Number(r[yi]), v = Number(r[vi]);
        if (Number.isFinite(x) && Number.isFinite(y) && Number.isFinite(v)) {
          rows.push({ x, y, v });
        }
      }
      if (!rows.length) throw new Error(`no numeric rows in xlsx ${def.src} (sheet=${sheetName})`);
      return rasterRowsToPngDataUrl(rows, def.range);
    }

    async function decodeTiffToPngDataUrl(url) {
      const res = await fetch(url);
      if (!res.ok) throw new Error(`tiff fetch failed: ${res.status} ${url}`);
      const buf = await res.arrayBuffer();
      if (typeof UTIF === "undefined") throw new Error("UTIF library not loaded");
      const ifds = UTIF.decode(buf);
      if (!ifds || !ifds.length) throw new Error(`no IFDs in ${url}`);
      UTIF.decodeImage(buf, ifds[0]);
      const rgba = UTIF.toRGBA8(ifds[0]);
      const W = ifds[0].width, H = ifds[0].height;
      const canvas = document.createElement('canvas');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      const imgData = ctx.createImageData(W, H);
      imgData.data.set(rgba);
      ctx.putImageData(imgData, 0, 0);
      return canvas.toDataURL("image/png");
    }

    (async () => {
      try {
        const external = await loadAtlasJsonExternal();
        await domReady; // DOM初期化完了を待つ
        if (!external) {
          await initializeViewer();
          return;
        }
        const params2 = new URLSearchParams(location.search);
        const atlasId2 = params2.get('atlas') || '';
        const baseDir = atlasId2 ? `../datasets/${atlasId2}/` : '';
        atlasData = {
          meta: external.meta || { format: "roi_bundle_v1" },
          roi: external.roi || {},
          images: {},
          world_coords: external.world_coords || {},
          thumbnail_order: Array.isArray(external.thumbnail_order) ? external.thumbnail_order : []
        };
        for (const [k, v] of Object.entries(external.images || {})) {
          if (typeof v === "string" && !/^data:|^https?:|^\.\.\//.test(v)) {
            atlasData.images[k] = baseDir + encodeURI(v);
          } else {
            atlasData.images[k] = v;
          }
        }
        const series = external.txt_series || {};
        for (const [key, def] of Object.entries(series)) {
          try {
            const defFixed = Object.assign({}, def);
            if (defFixed && typeof defFixed.src === "string" && !/^https?:|^data:|^\.\.\//.test(defFixed.src)) {
              defFixed.src = baseDir + encodeURI(defFixed.src);
            }
            const pngUrl = await buildPngFromTxt(defFixed);
            atlasData.images[key] = pngUrl;
          } catch (e) {
            console.warn("txt -> PNG 生成に失敗:", key, e);
          }
        }
        const xlsxSeries = external.xlsx_series || {};
        for (const [key, def] of Object.entries(xlsxSeries)) {
          try {
            const defFixed = Object.assign({}, def);
            if (defFixed && typeof defFixed.src === "string" && !/^https?:|^data:|^\.\.\//.test(defFixed.src)) {
              defFixed.src = baseDir + encodeURI(defFixed.src);
            }
            const pngUrl = await buildPngFromXlsx(defFixed);
            atlasData.images[key] = pngUrl;
          } catch (e) {
            console.warn("xlsx -> PNG 生成に失敗:", key, e);
          }
        }
        await initializeViewer();
      } catch (e) {
        console.error(e);
        try { await initializeViewer(); } catch (_) {}
      }
    })();</script>
